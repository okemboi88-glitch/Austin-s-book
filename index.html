<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>A Gentle Guide of Moving Forward</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Georgia, serif;
    background:#f5f2eb;
    color:#222;
    line-height:1.8;
}

/* NAVBAR */

nav{
    width:100%;
    background:#111;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

nav ul li a:hover{
    color:#d4af37;
}

/* HERO SECTION */

.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1200');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero-content{
    max-width:800px;
    color:white;
}

.hero h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    border-radius:40px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:white;
}

/* ABOUT */

.section{
    padding:80px 10%;
}

.section-title{
    font-size:42px;
    margin-bottom:25px;
    text-align:center;
}

.about{
    max-width:900px;
    margin:auto;
    text-align:center;
    font-size:20px;
}

/* CHAPTERS */

.chapters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    margin-top:50px;
}

.chapter-card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.chapter-card:hover{
    transform:translateY(-10px);
}

.chapter-card h3{
    margin-bottom:15px;
    color:#111;
}

/* QUOTE */

.quote{
    background:#111;
    color:white;
    text-align:center;
    padding:80px 10%;
}

.quote h2{
    font-size:40px;
    margin-bottom:20px;
}

.quote p{
    font-size:22px;
    max-width:800px;
    margin:auto;
}

/* AUTHOR */

.author{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:40px;
    margin-top:50px;
}

.author img{
    width:300px;
    border-radius:20px;
}

.author-text{
    flex:1;
}

.author-text h2{
    margin-bottom:20px;
    font-size:38px;
}

/* FOOTER */

footer{
    background:#000;
    color:white;
    text-align:center;
    padding:30px;
    margin-top:60px;
}

@media(max-width:768px){

.hero h1{
    font-size:40px;
}

.hero p{
    font-size:18px;
}

nav{
    flex-direction:column;
    gap:15px;
}

.author{
    flex-direction:column;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">
Moving Forward
</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Chapters</a></li>
<li><a href="#">Author</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>A Gentle Guide of Moving Forward</h1>

<p>
A powerful journey of healing, growth, purpose and discovering strength again.
</p>

<a href="#" class="btn">
Read the Book
</a>

</div>

</section>

<!-- ABOUT -->

<section class="section">

<h2 class="section-title">
About The Book
</h2>

<div class="about">

<p>
This book was written to inspire hope, healing
